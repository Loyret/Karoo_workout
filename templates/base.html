<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Karoo Trainer{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">
                <span class="nav-icon">&#9881;</span>
                Karoo Trainer
            </a>
        </div>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Главная</a>
            <a href="/templates" class="{% if '/template' in request.path %}active{% endif %}">Шаблоны</a>
            <a href="/builder" class="{% if request.path == '/builder' %}active{% endif %}">Конструктор</a>
            <a href="/education" class="{% if request.path == '/education' %}active{% endif %}">Обучение</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Karoo Trainer &mdash; Генератор тренировок для Hammerhead Karoo 3</p>
        <p class="footer-sub">Формат ZWO &bull; Совместимо с Hammerhead Dashboard</p>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
